name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version without the leading v, for example 0.3.0"
        required: true
        type: string
      bump_type:
        description: "Version bump classification"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
          - none
      why:
        description: "Short reason this release version is being cut"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag-and-release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Validate release request
        id: validate
        env:
          VERSION: ${{ inputs.version }}
          BUMP_TYPE: ${{ inputs.bump_type }}
          WHY: ${{ inputs.why }}
        run: |
          set -euo pipefail

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must match MAJOR.MINOR.PATCH without a leading v."
            exit 1
          fi

          if ! [[ "$BUMP_TYPE" =~ ^(major|minor|patch|none)$ ]]; then
            echo "Bump type must be one of: major, minor, patch, none."
            exit 1
          fi

          if [ -z "${WHY// }" ]; then
            echo "Release reason is required."
            exit 1
          fi

          git fetch origin main --tags

          tag="v${VERSION}"
          remote_main="$(git rev-parse origin/main)"
          local_head="$(git rev-parse HEAD)"

          if [ "$local_head" != "$remote_main" ]; then
            echo "Checked out main is not aligned with origin/main."
            exit 1
          fi

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists."
            exit 1
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "sha=${local_head}" >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        env:
          TAG: ${{ steps.validate.outputs.tag }}
          SHA: ${{ steps.validate.outputs.sha }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$SHA" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.validate.outputs.tag }}
          name: ${{ steps.validate.outputs.tag }}
          target_commitish: ${{ steps.validate.outputs.sha }}
          generate_release_notes: true
          body: |
            Bump type: `${{ inputs.bump_type }}`
            Why this bump: ${{ inputs.why }}
