name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  version-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - name: Create release PR (when changesets exist)
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          commit: "chore(release): version packages"
          title: "chore(release): version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check publish prerequisites
        id: publish-check
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "${NPM_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "NPM_TOKEN is not configured; package publish will be skipped."
          fi
      - name: Publish packages
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && steps.publish-check.outputs.enabled == 'true' }}
        run: pnpm changeset publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Skip publish (NPM_TOKEN missing)
        if: ${{ steps.changesets.outputs.hasChangesets == 'false' && steps.publish-check.outputs.enabled != 'true' }}
        run: echo "Skipping package publish because NPM_TOKEN is not configured."
