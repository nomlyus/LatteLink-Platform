name: publish-images

on:
  workflow_dispatch:
  push:
    branches:
      - develop
      - main

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_prefix: ${{ steps.meta.outputs.image_prefix }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - id: meta
        env:
          REPOSITORY: ${{ github.repository }}
          SHA: ${{ github.sha }}
        run: |
          owner="${REPOSITORY%%/*}"
          repo="${REPOSITORY##*/}"
          owner="${owner,,}"
          repo="${repo,,}"

          echo "image_prefix=ghcr.io/${owner}/${repo}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA}" >> "$GITHUB_OUTPUT"

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - service_name: gateway
            service_package: "@lattelink/gateway"
          - service_name: identity
            service_package: "@lattelink/identity"
          - service_name: orders
            service_package: "@lattelink/orders"
          - service_name: catalog
            service_package: "@lattelink/catalog"
          - service_name: payments
            service_package: "@lattelink/payments"
          - service_name: loyalty
            service_package: "@lattelink/loyalty"
          - service_name: notifications
            service_package: "@lattelink/notifications"
          - service_name: workers/menu-sync
            service_package: "@lattelink/menu-sync-worker"
          - service_name: workers/notifications-dispatch
            service_package: "@lattelink/notifications-dispatch-worker"
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          IMAGE_PREFIX: ${{ needs.prepare.outputs.image_prefix }}
          SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}
          SERVICE_NAME: ${{ matrix.service_name }}
        run: |
          {
            echo "tags<<EOF"
            echo "${IMAGE_PREFIX}/${SERVICE_NAME}:${SHA_TAG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/node-service.Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            SERVICE_PACKAGE=${{ matrix.service_package }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service_name }}

  summary:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - publish
    steps:
      - name: Write summary
        env:
          IMAGE_PREFIX: ${{ needs.prepare.outputs.image_prefix }}
          SHA_TAG: ${{ needs.prepare.outputs.sha_tag }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          {
            echo "## Published Images"
            echo
            echo "- Branch: \`${BRANCH_NAME}\`"
            echo "- Prefix: \`${IMAGE_PREFIX}\`"
            echo "- SHA tag: \`${SHA_TAG}\`"
            echo
            echo "- Pushes to \`develop\` automatically flow into \`deploy-dev\`."
            echo "- Production deploys should promote an explicit SHA through \`deploy-prod\`."
          } >> "$GITHUB_STEP_SUMMARY"
