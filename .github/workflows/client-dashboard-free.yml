name: client-dashboard-free

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "apps/operator-web/**"
      - "packages/contracts-auth/**"
      - "packages/contracts-catalog/**"
      - "packages/contracts-orders/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "infra/free/Caddyfile"
      - "infra/free/docker-compose.yml"
      - ".github/workflows/client-dashboard-free.yml"

permissions:
  contents: read

concurrency:
  group: client-dashboard-free-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @gazelle/operator-web typecheck
      - run: pnpm --filter @gazelle/operator-web lint
      - run: pnpm --filter @gazelle/operator-web build

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: deploy-check
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.FREE_DEPLOY_SSH_KEY }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
          CLIENT_DASHBOARD_DOMAIN: ${{ vars.FREE_CLIENT_DASHBOARD_DOMAIN }}
          CLIENT_DASHBOARD_ENV: ${{ secrets.FREE_CLIENT_DASHBOARD_ENV }}
        run: |
          missing=0
          for required in DEPLOY_HOST DEPLOY_USER DEPLOY_KEY LETSENCRYPT_EMAIL CLIENT_DASHBOARD_DOMAIN CLIENT_DASHBOARD_ENV; do
            if [ -z "${!required}" ]; then
              echo "missing: ${required}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping client dashboard deploy because one or more required secrets/variables are missing."
          fi

      - uses: pnpm/action-setup@v4
        if: steps.deploy-check.outputs.enabled == 'true'
      - uses: actions/setup-node@v4
        if: steps.deploy-check.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm
      - if: steps.deploy-check.outputs.enabled == 'true'
        run: pnpm install --no-frozen-lockfile
      - name: Write client dashboard env file
        if: steps.deploy-check.outputs.enabled == 'true'
        env:
          CLIENT_DASHBOARD_ENV: ${{ secrets.FREE_CLIENT_DASHBOARD_ENV }}
        run: |
          printf '%s\n' "${CLIENT_DASHBOARD_ENV}" > apps/operator-web/.env.production.local
      - name: Build client dashboard for production
        if: steps.deploy-check.outputs.enabled == 'true'
        run: pnpm --filter @gazelle/operator-web build
      - name: Remove client dashboard env file
        if: always()
        run: rm -f apps/operator-web/.env.production.local

      - name: Setup SSH key
        if: steps.deploy-check.outputs.enabled == 'true'
        env:
          DEPLOY_KEY: ${{ secrets.FREE_DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${DEPLOY_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Copy dashboard bundle and edge config to server
        if: steps.deploy-check.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          FREE_DEPLOY_PATH: ${{ vars.FREE_DEPLOY_PATH }}
        run: |
          DEPLOY_PATH="${FREE_DEPLOY_PATH:-/opt/gazelle-free}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}/client-dashboard'"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 infra/free/Caddyfile "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/Caddyfile"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 infra/free/docker-compose.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.yml"
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 -r apps/operator-web/dist/* "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/client-dashboard/"

      - name: Reload Caddy with dashboard domain
        if: steps.deploy-check.outputs.enabled == 'true'
        env:
          DEPLOY_HOST: ${{ secrets.FREE_DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.FREE_DEPLOY_USER }}
          FREE_DEPLOY_PATH: ${{ vars.FREE_DEPLOY_PATH }}
          FREE_CLIENT_DASHBOARD_DOMAIN: ${{ vars.FREE_CLIENT_DASHBOARD_DOMAIN }}
          LETSENCRYPT_EMAIL: ${{ secrets.LETSENCRYPT_EMAIL }}
        run: |
          DEPLOY_PATH="${FREE_DEPLOY_PATH:-/opt/gazelle-free}"

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "export DEPLOY_PATH='${DEPLOY_PATH}' FREE_CLIENT_DASHBOARD_DOMAIN='${FREE_CLIENT_DASHBOARD_DOMAIN}' LETSENCRYPT_EMAIL='${LETSENCRYPT_EMAIL}'; bash -s" <<'REMOTE'
          set -euo pipefail

          cd "${DEPLOY_PATH}"
          touch .env

          tmp_env="$(mktemp)"
          grep -vE '^(CLIENT_DASHBOARD_DOMAIN|LETSENCRYPT_EMAIL)=' .env > "${tmp_env}" || true
          cat "${tmp_env}" > .env
          rm -f "${tmp_env}"

          printf 'CLIENT_DASHBOARD_DOMAIN=%s\n' "${FREE_CLIENT_DASHBOARD_DOMAIN}" >> .env
          printf 'LETSENCRYPT_EMAIL=%s\n' "${LETSENCRYPT_EMAIL}" >> .env

          docker compose --env-file .env up -d caddy
          docker compose --env-file .env ps caddy
          REMOTE

      - name: Smoke check deployed client dashboard
        if: steps.deploy-check.outputs.enabled == 'true'
        env:
          FREE_CLIENT_DASHBOARD_DOMAIN: ${{ vars.FREE_CLIENT_DASHBOARD_DOMAIN }}
        run: |
          curl --fail --silent --show-error "https://${FREE_CLIENT_DASHBOARD_DOMAIN}" > /dev/null

      - name: Skip deploy (prerequisites missing)
        if: steps.deploy-check.outputs.enabled != 'true'
        run: echo "client-dashboard-free skipped due to missing required secrets/variables."
