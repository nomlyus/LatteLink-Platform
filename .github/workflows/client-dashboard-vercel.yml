name: client-dashboard-vercel

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/operator-web/**"
      - "packages/contracts-auth/**"
      - "packages/contracts-catalog/**"
      - "packages/contracts-orders/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/client-dashboard-vercel.yml"
  push:
    branches:
      - main
    paths:
      - "apps/operator-web/**"
      - "packages/contracts-auth/**"
      - "packages/contracts-catalog/**"
      - "packages/contracts-orders/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/client-dashboard-vercel.yml"

permissions:
  contents: read

concurrency:
  group: client-dashboard-vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.CLIENT_DASHBOARD_VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.CLIENT_DASHBOARD_VERCEL_PROJECT_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm --filter @gazelle/operator-web typecheck
      - run: pnpm --filter @gazelle/operator-web lint
      - run: pnpm --filter @gazelle/operator-web build

  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Check Vercel preview deploy prerequisites
        id: preview-check
        env:
          VERCEL_TOKEN: ${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
          CLIENT_DASHBOARD_ENV: ${{ secrets.CLIENT_DASHBOARD_VERCEL_ENV }}
        run: |
          missing=0
          for required in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID CLIENT_DASHBOARD_ENV; do
            if [ -z "${!required}" ]; then
              echo "missing: ${required}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Vercel preview deploy because one or more required secrets are missing."
          fi
      - uses: actions/setup-node@v4
        if: steps.preview-check.outputs.enabled == 'true'
        with:
          node-version: 22
      - name: Install Vercel CLI
        if: steps.preview-check.outputs.enabled == 'true'
        run: npm install --global vercel@latest
      - name: Write client dashboard preview env files
        if: steps.preview-check.outputs.enabled == 'true'
        env:
          CLIENT_DASHBOARD_ENV: ${{ secrets.CLIENT_DASHBOARD_VERCEL_ENV }}
        run: |
          printf '%s\n' "${CLIENT_DASHBOARD_ENV}" > apps/operator-web/.env.local
          printf '%s\n' "${CLIENT_DASHBOARD_ENV}" > apps/operator-web/.env.production.local
      - name: Pull Vercel preview configuration
        if: steps.preview-check.outputs.enabled == 'true'
        run: vercel pull --yes --environment=preview --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Build client dashboard preview artifacts for Vercel
        if: steps.preview-check.outputs.enabled == 'true'
        run: vercel build --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Deploy client dashboard preview to Vercel
        if: steps.preview-check.outputs.enabled == 'true'
        run: vercel deploy --prebuilt --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Remove client dashboard env files
        if: always()
        run: rm -f apps/operator-web/.env.local apps/operator-web/.env.production.local
      - name: Skip Vercel preview deploy
        if: steps.preview-check.outputs.enabled != 'true'
        run: echo "Preview deploy skipped until CLIENT_DASHBOARD_VERCEL_TOKEN, CLIENT_DASHBOARD_VERCEL_ORG_ID, CLIENT_DASHBOARD_VERCEL_PROJECT_ID, and CLIENT_DASHBOARD_VERCEL_ENV are configured."

  deploy-production:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - name: Check Vercel production deploy prerequisites
        id: production-check
        env:
          VERCEL_TOKEN: ${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
          CLIENT_DASHBOARD_ENV: ${{ secrets.CLIENT_DASHBOARD_VERCEL_ENV }}
        run: |
          missing=0
          for required in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID CLIENT_DASHBOARD_ENV; do
            if [ -z "${!required}" ]; then
              echo "missing: ${required}"
              missing=1
            fi
          done

          if [ "${missing}" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Skipping Vercel production deploy because one or more required secrets are missing."
          fi
      - uses: actions/setup-node@v4
        if: steps.production-check.outputs.enabled == 'true'
        with:
          node-version: 22
      - name: Install Vercel CLI
        if: steps.production-check.outputs.enabled == 'true'
        run: npm install --global vercel@latest
      - name: Write client dashboard production env files
        if: steps.production-check.outputs.enabled == 'true'
        env:
          CLIENT_DASHBOARD_ENV: ${{ secrets.CLIENT_DASHBOARD_VERCEL_ENV }}
        run: |
          printf '%s\n' "${CLIENT_DASHBOARD_ENV}" > apps/operator-web/.env.local
          printf '%s\n' "${CLIENT_DASHBOARD_ENV}" > apps/operator-web/.env.production.local
      - name: Pull Vercel production configuration
        if: steps.production-check.outputs.enabled == 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Build client dashboard production artifacts for Vercel
        if: steps.production-check.outputs.enabled == 'true'
        run: vercel build --prod --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Deploy client dashboard production to Vercel
        if: steps.production-check.outputs.enabled == 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.CLIENT_DASHBOARD_VERCEL_TOKEN }}
      - name: Remove client dashboard env files
        if: always()
        run: rm -f apps/operator-web/.env.local apps/operator-web/.env.production.local
      - name: Skip Vercel production deploy
        if: steps.production-check.outputs.enabled != 'true'
        run: echo "Production deploy skipped until CLIENT_DASHBOARD_VERCEL_TOKEN, CLIENT_DASHBOARD_VERCEL_ORG_ID, CLIENT_DASHBOARD_VERCEL_PROJECT_ID, and CLIENT_DASHBOARD_VERCEL_ENV are configured."
