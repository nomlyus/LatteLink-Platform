name: deploy-dev

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  API_BASE_URL_DEV: ${{ vars.API_BASE_URL_DEV }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - name: Check deploy prerequisites
        id: deploy-check
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [ -z "${AWS_ROLE_ARN}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "AWS_ROLE_ARN is not configured; deploy will be skipped."
            exit 0
          fi

          if [ -z "${API_BASE_URL_DEV}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "API_BASE_URL_DEV is not configured; deploy will be skipped."
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.deploy-check.outputs.enabled == 'true'
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        if: steps.deploy-check.outputs.enabled == 'true'
      - if: steps.deploy-check.outputs.enabled == 'true'
        run: terraform -chdir=infra/terraform/envs/dev init
      - if: steps.deploy-check.outputs.enabled == 'true'
        run: terraform -chdir=infra/terraform/envs/dev apply -auto-approve -var "image_tag=${IMAGE_TAG}"
      - if: steps.deploy-check.outputs.enabled == 'true'
        run: ./infra/terraform/scripts/smoke-check.sh dev
      - name: Skip deploy (AWS_ROLE_ARN missing)
        if: steps.deploy-check.outputs.enabled != 'true'
        run: echo "Skipping deploy-dev because dev environment secret AWS_ROLE_ARN is not configured."
