services:
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    environment:
      - API_DOMAIN=${API_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

  gateway:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=8080
      - IDENTITY_SERVICE_BASE_URL=http://identity:3000
      - ORDERS_SERVICE_BASE_URL=http://orders:3001
      - CATALOG_SERVICE_BASE_URL=http://catalog:3002
      - PAYMENTS_SERVICE_BASE_URL=http://payments:3003
      - LOYALTY_SERVICE_BASE_URL=http://loyalty:3004
      - NOTIFICATIONS_SERVICE_BASE_URL=http://notifications:3005
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - ORDERS_INTERNAL_API_TOKEN=${ORDERS_INTERNAL_API_TOKEN:-}
      - JWT_SECRET=${JWT_SECRET:-}
      - CLIENT_DASHBOARD_DOMAIN=${CLIENT_DASHBOARD_DOMAIN:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://localhost:8080}
      - PUBLIC_API_BASE_URL=${PUBLIC_API_BASE_URL:-http://localhost:8080/v1}
      - GATEWAY_UPSTREAM_TIMEOUT_MS=${GATEWAY_UPSTREAM_TIMEOUT_MS:-5000}
      - GATEWAY_RATE_LIMIT_WINDOW_MS=${GATEWAY_RATE_LIMIT_WINDOW_MS:-60000}
      - VALKEY_URL=redis://valkey:6379
    depends_on:
      - identity
      - orders
      - catalog
      - payments
      - loyalty
      - notifications
      - valkey

  identity:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/identity:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET:-}
      - PASSKEY_RP_ID=${PASSKEY_RP_ID:-localhost}
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - ALLOW_DEV_CUSTOMER_LOGIN=${ALLOW_DEV_CUSTOMER_LOGIN:-}
      - APPLE_TEAM_ID=${APPLE_TEAM_ID:-}
      - APPLE_KEY_ID=${APPLE_KEY_ID:-}
      - APPLE_PRIVATE_KEY=${APPLE_PRIVATE_KEY:-}
      - APPLE_CLIENT_ID=${APPLE_CLIENT_ID:-}
      - APPLE_ALLOWED_CLIENT_IDS=${APPLE_ALLOWED_CLIENT_IDS:-}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_STATE_SECRET=${GOOGLE_OAUTH_STATE_SECRET:-}
      - GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS=${GOOGLE_OAUTH_ALLOWED_REDIRECT_URIS:-}
    depends_on:
      postgres:
        condition: service_healthy

  orders:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/orders:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3001
      - DATABASE_URL=${DATABASE_URL}
      - CATALOG_SERVICE_BASE_URL=http://catalog:3002
      - PAYMENTS_SERVICE_BASE_URL=http://payments:3003
      - LOYALTY_SERVICE_BASE_URL=http://loyalty:3004
      - NOTIFICATIONS_SERVICE_BASE_URL=http://notifications:3005
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - ORDERS_INTERNAL_API_TOKEN=${ORDERS_INTERNAL_API_TOKEN:-}
      - LOYALTY_INTERNAL_API_TOKEN=${LOYALTY_INTERNAL_API_TOKEN:-}
      - NOTIFICATIONS_INTERNAL_API_TOKEN=${NOTIFICATIONS_INTERNAL_API_TOKEN:-}
      - VALKEY_URL=redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  catalog:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/catalog:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3002
      - DATABASE_URL=${DATABASE_URL}
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - CATALOG_MEDIA_R2_ACCOUNT_ID=${CATALOG_MEDIA_R2_ACCOUNT_ID:-}
      - CATALOG_MEDIA_R2_ACCESS_KEY_ID=${CATALOG_MEDIA_R2_ACCESS_KEY_ID:-}
      - CATALOG_MEDIA_R2_SECRET_ACCESS_KEY=${CATALOG_MEDIA_R2_SECRET_ACCESS_KEY:-}
      - CATALOG_MEDIA_R2_BUCKET=${CATALOG_MEDIA_R2_BUCKET:-}
      - CATALOG_MEDIA_PUBLIC_BASE_URL=${CATALOG_MEDIA_PUBLIC_BASE_URL:-}
      - CATALOG_MEDIA_UPLOAD_MAX_BYTES=${CATALOG_MEDIA_UPLOAD_MAX_BYTES:-10485760}
      - CATALOG_MEDIA_UPLOAD_EXPIRY_SECONDS=${CATALOG_MEDIA_UPLOAD_EXPIRY_SECONDS:-300}
    depends_on:
      postgres:
        condition: service_healthy

  payments:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/payments:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3003
      - DATABASE_URL=${DATABASE_URL}
      - CATALOG_SERVICE_BASE_URL=http://catalog:3002
      - ORDERS_SERVICE_BASE_URL=http://orders:3001
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - ORDERS_INTERNAL_API_TOKEN=${ORDERS_INTERNAL_API_TOKEN:-}
      - PAYMENTS_PROVIDER_MODE=${PAYMENTS_PROVIDER_MODE:-simulated}
      - CLOVER_OAUTH_ENVIRONMENT=${CLOVER_OAUTH_ENVIRONMENT:-sandbox}
      - CLOVER_APP_ID=${CLOVER_APP_ID:-}
      - CLOVER_APP_SECRET=${CLOVER_APP_SECRET:-}
      - CLOVER_OAUTH_REDIRECT_URI=${CLOVER_OAUTH_REDIRECT_URI:-}
      - CLOVER_OAUTH_STATE_SECRET=${CLOVER_OAUTH_STATE_SECRET:-}
      - CLOVER_WEBHOOK_SHARED_SECRET=${CLOVER_WEBHOOK_SHARED_SECRET:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_CONNECT_WEBHOOK_SECRET=${STRIPE_CONNECT_WEBHOOK_SECRET:-}
    depends_on:
      catalog:
        condition: service_started
      postgres:
        condition: service_healthy

  loyalty:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/loyalty:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3004
      - DATABASE_URL=${DATABASE_URL}
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - LOYALTY_INTERNAL_API_TOKEN=${LOYALTY_INTERNAL_API_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy

  notifications:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/notifications:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3005
      - DATABASE_URL=${DATABASE_URL}
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - NOTIFICATIONS_INTERNAL_API_TOKEN=${NOTIFICATIONS_INTERNAL_API_TOKEN:-}
      - NOTIFICATIONS_PROVIDER_MODE=${NOTIFICATIONS_PROVIDER_MODE:-expo}
      - EXPO_PUSH_API_URL=${EXPO_PUSH_API_URL:-}
      - EXPO_ACCESS_TOKEN=${EXPO_ACCESS_TOKEN:-}
      - VALKEY_URL=redis://valkey:6379
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_started

  worker-notifications-dispatch:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/workers/notifications-dispatch:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NOTIFICATIONS_SERVICE_BASE_URL=http://notifications:3005
      - NOTIFICATIONS_INTERNAL_API_TOKEN=${NOTIFICATIONS_INTERNAL_API_TOKEN:-}
      - NOTIFICATIONS_DISPATCH_INTERVAL_MS=${NOTIFICATIONS_DISPATCH_INTERVAL_MS:-5000}
      - NOTIFICATIONS_DISPATCH_BATCH_SIZE=${NOTIFICATIONS_DISPATCH_BATCH_SIZE:-50}
    depends_on:
      - notifications

  worker-menu-sync:
    image: ${IMAGE_REGISTRY_PREFIX:-ghcr.io/anxiousdaoud/lattelink-platform}/workers/menu-sync:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - CATALOG_SERVICE_BASE_URL=http://catalog:3002
      - GATEWAY_INTERNAL_API_TOKEN=${GATEWAY_INTERNAL_API_TOKEN:-}
      - WEBAPP_MENU_SOURCE_URL=${WEBAPP_MENU_SOURCE_URL:-}
      - MENU_SYNC_LOCATION_ID=${MENU_SYNC_LOCATION_ID:-}
      - MENU_SYNC_INTERVAL_MS=${MENU_SYNC_INTERVAL_MS:-300000}
      - MENU_SYNC_MAX_RETRIES=${MENU_SYNC_MAX_RETRIES:-3}
      - MENU_SYNC_RETRY_DELAY_MS=${MENU_SYNC_RETRY_DELAY_MS:-2000}
    volumes:
      - menu_sync_dead_letter:/app/dead-letter
    depends_on:
      - catalog

  postgres:
    image: postgres:16-alpine
    container_name: lattelink-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=gazelle
      - POSTGRES_DB=gazelle
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gazelle -d gazelle"]
      interval: 5s
      timeout: 5s
      retries: 12

  valkey:
    image: valkey/valkey:8-alpine
    container_name: lattelink-valkey
    restart: unless-stopped
    volumes:
      - valkey_data:/data

volumes:
  postgres_data:
  valkey_data:
  caddy_data:
  caddy_config:
  menu_sync_dead_letter:
